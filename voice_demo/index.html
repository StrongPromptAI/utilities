<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f7f2" />
    <title>Shared Services Voice Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">utilities / shared-svcs</p>
          <h1>Voice transport demo</h1>
        </div>
        <div class="service-pills" aria-label="Service status">
          <span id="sttHealth" class="pill">STT unchecked</span>
          <span id="ttsHealth" class="pill">TTS unchecked</span>
        </div>
      </header>

      <section id="transcript" class="transcript" aria-live="polite" aria-label="Chat transcript">
        <article class="bubble assistant">
          <span class="bubble-label">Harness</span>
          <p>Type, listen, or play TTS. This page only tests shared service transport and half-duplex gating.</p>
        </article>
      </section>

      <section class="tts-panel" aria-label="TTS playback">
        <label for="ttsText">TTS text</label>
        <textarea id="ttsText" rows="2">This is a local half-duplex TTS check through shared services.</textarea>
        <div class="panel-actions">
          <button id="speakButton" class="secondary-button" type="button">Play TTS</button>
          <button id="stopAudioButton" class="ghost-button" type="button" disabled>Stop audio</button>
        </div>
      </section>

      <form id="chatForm" class="input-bar">
        <button id="voiceModeButton" class="voice-mode-button" type="button" aria-label="Text only - tap to enable voice input">
          <span id="voiceIcon" class="voice-icon" aria-hidden="true"></span>
          <span id="voiceLabel">Type</span>
        </button>
        <textarea id="chatInput" rows="1" placeholder="Type a message or tap Listen" aria-label="Message"></textarea>
        <button id="sendButton" class="send-button" type="submit" aria-label="Send message">
          <span aria-hidden="true">↑</span>
        </button>
      </form>

      <p id="statusLine" class="status-line">Ready.</p>
    </main>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
